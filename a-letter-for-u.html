<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestie Love App 💖</title>

<style>
body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background:#ffe3ec;
    color:#ff4b6e;
}

/* APP HEADER */
.header{
    background:#ff4b6e;
    color:white;
    padding:15px;
    font-weight:bold;
    font-size:18px;
}

/* sections */
.section{ display:none; padding:20px; text-align:center; }
.show{ display:block; }

/* envelope */
.envelope{
    font-size:90px;
    margin-top:60px;
    cursor:pointer;
}

/* game */
#gameArea{
    position:relative;
    height:50vh;
    margin-top:10px;
}
.heart{
    position:absolute;
    font-size:28px;
    cursor:pointer;
}

/* message card */
.card{
    background:white;
    color:#ff4b6e;
    padding:20px;
    border-radius:20px;
    margin-top:40px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button{
    background:#ff4b6e;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:20px;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">💖 letter for u</div>

<!-- hidden audio -->
<audio id="bgMusic" loop>
  <source src="https://drive.google.com/file/d/11EQouOJQuX89EMNWq6AGr0Rtz9TSiZ31/view?usp=sharing" type="audio/mpeg">
</audio>

<!-- ENVELOPE -->
<div id="envelopeSection" class="section show">
    <h2>You received a message ✨</h2>
    <p>Tap to open</p>
    <div class="envelope" onclick="openEnvelope()">💌</div>
</div>

<!-- GAME -->
<div id="gameSection" class="section">
    <h2>Catch 10 hearts to unlock 💕</h2>
    <p>Score: <span id="score">0</span></p>
    <p>Time: <span id="time">15</span></p>
    <div id="gameArea"></div>
</div>

<!-- MESSAGE -->
<div id="messageSection" class="section">
    <div class="card">
        <h2>Happy Galentine’s Day 🌷</h2>
        <p>
            Thank you for the dramas, teas,
            and laughs, my college life won't be 
            memorable without you.
            <br><br>
            thankful to have u as my Gals 💖
        </p>
        <p><b>out of branding.</b> 😌</p>
        <p style="margin-top:15px;">Love, <b>injil</b></p>
    </div>
</div>

<script>
const music = document.getElementById("bgMusic");

function openEnvelope(){
    music.play().catch(()=>{});
    document.getElementById("envelopeSection").classList.remove("show");
    document.getElementById("gameSection").classList.add("show");
    startGame();
}

let score = 0;
let timeLeft = 15;
let gameInterval;
let timerInterval;

function startGame(){
    score = 0;
    timeLeft = 15;
    scoreEl = document.getElementById("score");
    timeEl = document.getElementById("time");
    scoreEl.innerText = score;
    timeEl.innerText = timeLeft;

    gameInterval = setInterval(spawnHeart, 600);

    timerInterval = setInterval(()=>{
        timeLeft--;
        timeEl.innerText = timeLeft;
        if(timeLeft <= 0) endGame();
    },1000);
}

function spawnHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*90 + "%";
    heart.style.top = Math.random()*80 + "%";

    heart.onclick = () => {
        score++;
        document.getElementById("score").innerText = score;
        heart.remove();
    };

    document.getElementById("gameArea").appendChild(heart);
    setTimeout(()=>heart.remove(),2000);
}

function endGame(){
    clearInterval(gameInterval);
    clearInterval(timerInterval);

    document.getElementById("gameSection").classList.remove("show");
    document.getElementById("messageSection").classList.add("show");
}
</script>

</body>
</html>
